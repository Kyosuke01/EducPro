<svg version="1.2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
	<defs>
		<linearGradient id="eduGradient" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" style="stop-color:#a4b0f5;stop-opacity:1" />
			<stop offset="100%" style="stop-color:#12664f;stop-opacity:1" />
		</linearGradient>
		<linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" style="stop-color:#12664f;stop-opacity:1" />
			<stop offset="100%" style="stop-color:#a4b0f5;stop-opacity:0.8" />
		</linearGradient>
	</defs>
	
	<!-- Background Circle -->
	<circle cx="100" cy="100" r="95" fill="none" stroke="url(#eduGradient)" stroke-width="2" opacity="0.3" />
	
	<!-- Book Pages -->
	<g transform="translate(100, 100)">
		<!-- Page left -->
		<path d="M -35 -40 L -15 -40 L -15 50 L -35 50 Q -45 50 -45 40 L -45 -30 Q -45 -40 -35 -40" 
		      fill="url(#eduGradient)" opacity="0.9" />
		
		<!-- Page right -->
		<path d="M -15 -40 L 35 -40 Q 45 -40 45 -30 L 45 40 Q 45 50 35 50 L -15 50 Z" 
		      fill="url(#accentGradient)" opacity="0.8" />
		
		<!-- Spine line -->
		<line x1="-15" y1="-40" x2="-15" y2="50" stroke="#f0ebd8" stroke-width="1.5" opacity="0.6" />
		
		<!-- Decorative lines on left page -->
		<line x1="-35" y1="-20" x2="-20" y2="-20" stroke="#f0ebd8" stroke-width="2" opacity="0.7" />
		<line x1="-35" y1="-5" x2="-20" y2="-5" stroke="#f0ebd8" stroke-width="2" opacity="0.7" />
		<line x1="-35" y1="10" x2="-20" y2="10" stroke="#f0ebd8" stroke-width="2" opacity="0.7" />
		<line x1="-35" y1="25" x2="-20" y2="25" stroke="#f0ebd8" stroke-width="2" opacity="0.6" />
		<line x1="-35" y1="40" x2="-20" y2="40" stroke="#f0ebd8" stroke-width="2" opacity="0.6" />
		
		<!-- Decorative lines on right page -->
		<line x1="5" y1="-20" x2="40" y2="-20" stroke="#f0ebd8" stroke-width="2" opacity="0.7" />
		<line x1="5" y1="-5" x2="40" y2="-5" stroke="#f0ebd8" stroke-width="2" opacity="0.7" />
		<line x1="5" y1="10" x2="40" y2="10" stroke="#f0ebd8" stroke-width="2" opacity="0.7" />
		<line x1="5" y1="25" x2="40" y2="25" stroke="#f0ebd8" stroke-width="2" opacity="0.6" />
		<line x1="5" y1="40" x2="40" y2="40" stroke="#f0ebd8" stroke-width="2" opacity="0.6" />
		
		<!-- Bookmark accent -->
		<rect x="32" y="-35" width="6" height="20" fill="url(#accentGradient)" rx="2" opacity="0.8" />
	</g>
</svg>
