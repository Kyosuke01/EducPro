name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── 01. Flake8 ──────────────────────────────────────────────────────────────
  flake8:
    name: "01 · Flake8 — Lint Python"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8
      - run: python -m flake8 backend/ --max-line-length=150 --exclude=__pycache__,.venv
      - run: python -m flake8 frontend/ --max-line-length=150 --exclude=__pycache__,.venv

  # ── 02. SonarCloud (SAST) ───────────────────────────────────────────────────
  sonarlint:
    name: "02 · SonarCloud — SAST"
    runs-on: ubuntu-latest
    needs: flake8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend test deps
        run: pip install -r backend/requirements.txt
      - name: Run backend tests with coverage
        run: |
          if [ -d backend/tests ]; then
            coverage run --source=backend/app -m pytest backend/tests
            coverage xml -o backend/coverage.xml
          else
            echo "backend/tests not found, generating empty-safe coverage file"
            mkdir -p backend
            printf '%s\n' '<?xml version="1.0" ?><coverage version="7.0"><sources><source>backend</source></sources><packages></packages></coverage>' > backend/coverage.xml
          fi
      - uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── 03. pip-audit ───────────────────────────────────────────────────────────
  pip-audit:
    name: "03 · pip-audit — Dépendances vulnérables"
    runs-on: ubuntu-latest
    needs: flake8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - run: pip install -r backend/requirements.txt && pip-audit
      - run: pip install -r frontend/requirements.txt && pip-audit

  # ── 04. OWASP ZAP (DAST) ───────────────────────────────────────────────────
  owasp-zap:
    name: "04 · OWASP ZAP — DAST"
    runs-on: ubuntu-latest
    needs: [sonarlint, pip-audit]
    steps:
      - uses: actions/checkout@v4

      - name: Créer les fichiers .env
        env:
          ROOT_ENV: ${{ secrets.ROOT_ENV }}
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
          FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
        run: |
          printf '%s\n' "$ROOT_ENV" > .env
          printf '%s\n' "$BACKEND_ENV" > ./backend/.env
          printf '%s\n' "$FRONTEND_ENV" > ./frontend/.env

      - name: Démarrer les services
        run: docker compose up -d && sleep 15

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:5000"
          cmd_options: "-a"
        continue-on-error: true

      - name: Upload rapport ZAP
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html

      - name: Arrêter les services
        if: always()
        run: docker compose down

  # ── 05. Build Docker ────────────────────────────────────────────────────────
  build-docker:
    name: "05 · Build Docker"
    runs-on: ubuntu-latest
    needs: owasp-zap
    steps:
      - uses: actions/checkout@v4

      - name: Créer les fichiers .env
        env:
          ROOT_ENV: ${{ secrets.ROOT_ENV }}
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
          FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
        run: |
          printf '%s\n' "$ROOT_ENV" > .env
          printf '%s\n' "$BACKEND_ENV" > ./backend/.env
          printf '%s\n' "$FRONTEND_ENV" > ./frontend/.env

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push via Docker Compose
        run: |
          docker compose build
          docker compose push

