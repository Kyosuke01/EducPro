openapi: 3.0.0
info:
  title: EduPro API
  description: |
    Complete API for the EduPro educational platform.
    Supports user management, authentication, attendance tracking, grades, schedules, and messaging.
  version: 1.0.0
  contact:
    name: EduPro Team
    email: support@educpro.local
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:5000/api
    description: Development server
  - url: http://backend:5000/api
    description: Docker Compose backend

security:
  - ApiKeyAuth: []
  - UserAgentAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API Secret Key for authentication
    UserAgentAuth:
      type: apiKey
      in: header
      name: User-Agent
      description: Valid User-Agent (educrpro/1.0 or educpro-admin/1.0)

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john@example.com"
        role:
          type: string
          enum: [student, teacher, admin]
          example: student
        class_name:
          type: string
          example: "1A"
        topic_name:
          type: string
          example: "Mathematics"

    AuthResponse:
      type: object
      properties:
        message:
          type: string
          example: "Connexion réussie."
        user_id:
          type: integer
          example: 1
        role:
          type: string
          example: student
        two_factor_required:
          type: boolean
          example: false

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Unauthorized"
        message:
          type: string
          example: "Invalid credentials"
        status:
          type: integer
          example: 401

    AttendanceRecord:
      type: object
      properties:
        id:
          type: integer
        student_id:
          type: integer
        date:
          type: string
          format: date
        status:
          type: string
          enum: [present, absent, late]
        notes:
          type: string

    Grade:
      type: object
      properties:
        id:
          type: integer
        student_id:
          type: integer
        subject:
          type: string
        grade:
          type: number
          format: float
          minimum: 0
          maximum: 20
        date:
          type: string
          format: date

    Message:
      type: object
      properties:
        id:
          type: integer
        sender_id:
          type: integer
        receiver_id:
          type: integer
        subject:
          type: string
        content:
          type: string
        timestamp:
          type: string
          format: date-time
        is_read:
          type: boolean

    EDT:
      type: object
      properties:
        id:
          type: integer
        topic_name:
          type: string
        room_name:
          type: string
        teacher_l_name:
          type: string
        teacher_f_name:
          type: string
        class_name:
          type: string
        start_time:
          type: string
          format: time
        end_time:
          type: string
          format: time

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Users
    description: User management
  - name: Classes
    description: Classes management
  - name: Attendance
    description: Attendance tracking
  - name: EDT
    description: Schedule (Emploi du Temps)
  - name: Grades
    description: Grades management
  - name: Messages
    description: Messages and support tickets

paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: User login
      description: Authenticate user and return session token
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags:
        - Auth
      summary: User logout
      description: Invalidate current session
      operationId: logout
      security: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Déconnexion réussie."

  /auth/2fa-setup:
    post:
      tags:
        - Auth
      summary: Setup two-factor authentication
      description: Generate 2FA secret and QR code
      operationId: setup2fa
      responses:
        '200':
          description: 2FA setup initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  qr_code:
                    type: string
                    description: Base64 encoded QR code image
                  secret:
                    type: string

  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Request password reset
      description: Send reset email to user
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Email de réinitialisation envoyé."

  /users:
    get:
      tags:
        - Users
      summary: List all users
      description: Get list of all students and teachers
      operationId: listUsers
      responses:
        '200':
          description: Users list retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Users
      summary: Create new user
      description: Create student or teacher account (admin only)
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_type, first_name, last_name, email, password]
              properties:
                user_type:
                  type: string
                  enum: [student, teacher]
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                class_name:
                  type: string
                  description: Required for students
                topic_name:
                  type: string
                  description: Required for teachers
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - admin required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{user_id}:
    get:
      tags:
        - Users
      summary: Get user details
      description: Retrieve specific user information
      operationId: getUser
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Users
      summary: Update user
      description: Modify user information
      operationId: updateUser
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                topic_name:
                  type: string
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Users
      summary: Delete user
      description: Remove user account (admin only)
      operationId: deleteUser
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '403':
          description: Forbidden - admin required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /classes:
    get:
      tags:
        - Classes
      summary: List all classes
      description: Get list of all school classes
      operationId: listClasses
      responses:
        '200':
          description: Classes list retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    teacher_id:
                      type: integer

    post:
      tags:
        - Classes
      summary: Create class
      description: Create new school class (admin only)
      operationId: createClass
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Class created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /attendance:
    get:
      tags:
        - Attendance
      summary: Get attendance records
      description: Retrieve attendance data filtered by parameters
      operationId: getAttendance
      parameters:
        - name: class_name
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Attendance records retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AttendanceRecord'

    post:
      tags:
        - Attendance
      summary: Record attendance
      description: Add or update attendance record (teacher/admin only)
      operationId: createAttendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [student_id, date, status]
              properties:
                student_id:
                  type: integer
                date:
                  type: string
                  format: date
                status:
                  type: string
                  enum: [present, absent, late]
                notes:
                  type: string
      responses:
        '201':
          description: Attendance recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /edt:
    get:
      tags:
        - EDT
      summary: Get schedule
      description: Retrieve class schedule (emploi du temps)
      operationId: getSchedule
      responses:
        '200':
          description: Schedule retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EDT'

    post:
      tags:
        - EDT
      summary: Create schedule entry
      description: Add new schedule entry (admin only)
      operationId: createScheduleEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [topic_name, room_name, class_name, start_time, end_time]
              properties:
                topic_name:
                  type: string
                room_name:
                  type: string
                teacher_l_name:
                  type: string
                teacher_f_name:
                  type: string
                class_name:
                  type: string
                start_time:
                  type: string
                  format: time
                end_time:
                  type: string
                  format: time
      responses:
        '201':
          description: Schedule entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /grades:
    get:
      tags:
        - Grades
      summary: Get grades
      description: Retrieve grades (student sees own, teacher/admin see all)
      operationId: getGrades
      parameters:
        - name: student_id
          in: query
          schema:
            type: integer
        - name: subject
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Grades retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Grade'

    post:
      tags:
        - Grades
      summary: Create/update grade
      description: Record or modify student grade (teacher/admin only)
      operationId: createGrade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [student_id, subject, grade]
              properties:
                student_id:
                  type: integer
                subject:
                  type: string
                grade:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 20
      responses:
        '201':
          description: Grade recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /messages:
    get:
      tags:
        - Messages
      summary: Get messages
      description: List user's messages (inbox)
      operationId: getMessages
      responses:
        '200':
          description: Messages retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'

    post:
      tags:
        - Messages
      summary: Send message
      description: Send support ticket or message
      operationId: sendMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [receiver_id, subject, content]
              properties:
                receiver_id:
                  type: integer
                subject:
                  type: string
                content:
                  type: string
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check if API is running
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
