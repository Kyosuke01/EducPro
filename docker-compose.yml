services:

  # 🗄️ MySQL
  db:
    image: mysql:8.0
    container_name: educpro_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - educpro_network

  # 🐍 Backend Flask (API)
  backend:
    build:
      context: ./backend
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY . .
        EXPOSE 5000
        CMD ["python", "app.py"]
    container_name: educpro_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - db
    networks:
      - educpro_network

  # 🌐 Frontend Flask + Jinja2
  frontend:
    build:
      context: ./frontend
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY . .
        EXPOSE 3000
        CMD ["python", "app.py"]
    container_name: educpro_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
    depends_on:
      - db
      - backend
    networks:
      - educpro_network

networks:
  educpro_network:
    driver: bridge

volumes:
  mysql_data:
