services:

  # 🗄️ MySQL
  db:
    image: mysql:8.0
    container_name: educpro_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: educpro_db
      MYSQL_USER: educpro_user
      MYSQL_PASSWORD: educpro_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - educpro_network

  # 🐍 Backend Flask (API)
  backend:
    build:
      context: ./backend
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY . .
        EXPOSE 5000
        CMD ["python", "app.py"]
    container_name: educpro_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - educpro_network

  # 🌐 Frontend Flask + Jinja2
  frontend:
    build:
      context: ./frontend
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY . .
        EXPOSE 3000
        CMD ["python", "app.py"]
    container_name: educpro_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - educpro_network

  # 🛠️ Admin Flask + Jinja2
  admin:
    build:
      context: ./admin
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY . .
        EXPOSE 3001
        CMD ["python", "app.py"]
    container_name: educpro_admin
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./admin/.env
    volumes:
      - ./admin:/app
    depends_on:
      - backend
    networks:
      - educpro_network

networks:
  educpro_network:
    driver: bridge

volumes:
  mysql_data:
