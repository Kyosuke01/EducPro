<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducPro - Connexion</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 45px 40px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            font-size: 3rem;
            color: #0d6efd;
            margin-bottom: 15px;
        }

        .brand-name {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: #1a1a2e;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            padding: 12px 15px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.15);
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(13, 110, 253, 0.4);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .remember-forgot a {
            color: #0d6efd;
            text-decoration: none;
        }

        .signup-section {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #e8ecf1;
        }

        .signup-text {
            font-size: 14px;
            color: #6c757d;
        }

        .signup-text a {
            color: #0d6efd;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 576px) {
            .login-container {
                padding: 35px 25px;
                margin: 20px;
            }

            .brand-name {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <div class="brand-name">EducPro</div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="form-label">Adresse e-mail</label>
                <input type="text" class="form-control" id="email" name="email" placeholder="votre.email@exemple.com" required>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Mot de passe</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="remember-forgot">
                <label style="margin: 0;">
                    <input type="checkbox"> Se souvenir de moi
                </label>
                <a href="#">Mot de passe oublié ?</a>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i> Se connecter
            </button>
        </form>

        <div class="signup-section">
            <div class="signup-text">
                Pas de compte ? <a href="#">Créer un compte</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // ============ LOGIN HANDLER ============
        const users = {
            'admin': { password: 'admin', role: 'admin' },
            'prof': { password: 'prof', role: 'teacher' },
            'e': { password: 'e', role: 'student' }
        };

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // Vérifier les identifiants
            if (users[email] && users[email].password === password) {
                const role = users[email].role;
                // Rediriger vers dashboard avec le rôle approprié
                window.location.href = `/dashboard?view=${role}`;
            } else {
                // Afficher un message d'erreur
                alert('❌ Identifiants invalides.\n\nComptes disponibles :\n\n👤 admin / admin (Administrateur)\n👨‍🏫 prof / prof (Professeur)\n👨‍🎓 e / e (Étudiant)');
                
                // Vider les champs
                document.getElementById('password').value = '';
                document.getElementById('email').focus();
            }
        });
    </script>
</body>
</html>
