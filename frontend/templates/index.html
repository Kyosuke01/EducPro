<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="EducPro - Plateforme de gestion scolaire et académique pour écoles, collèges et universités">
    <meta name="keywords" content="EducPro, Education, Admin Dashboard, Gestion Scolaire">
    <title>EducPro - Connexion</title>
    <link rel="stylesheet" href="static/assets/css/login.css">
</head>

<body>

    <div class="login-container">

        <!-- Left Side - Branding -->
        <div class="login-brand-section">
            <div class="brand-content">
                <div class="logo-wrapper">
                    <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#00e9d2;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#1a7a6f;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <!-- Book/Education icon -->
                        <path
                            d="M50 10 C 30 10, 20 20, 20 35 L 20 80 C 20 85, 25 90, 30 90 L 70 90 C 75 90, 80 85, 80 80 L 80 35 C 80 20, 70 10, 50 10 M 50 20 C 65 20, 70 25, 70 35 L 70 80 L 30 80 L 30 35 C 30 25, 35 20, 50 20 M 45 35 L 45 75 M 55 35 L 55 75 M 35 50 L 65 50"
                            fill="url(#logoGradient)" stroke="url(#logoGradient)" stroke-width="2"
                            stroke-linejoin="round" />
                        <!-- Circle around -->
                        <circle cx="50" cy="50" r="48" fill="none" stroke="url(#logoGradient)" stroke-width="1.5"
                            opacity="0.3" />
                    </svg>
                </div>
                <h1 class="brand-title">EducPro</h1>
                <p class="brand-subtitle">Plateforme de gestion scolaire</p>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="login-form-section">
            <div class="form-container">
                <h2 class="form-title">Connexion</h2>
                <p class="form-subtitle">Connectez-vous à votre compte</p>

                {% if error %}
                <div style="background: #fee2e2; border: 1px solid #fca5a5; color: #dc2626; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px;">
                    {{ error }}
                </div>
                {% endif %}

                <form action="/login" method="POST" class="login-form">

                    <div class="form-group">
                        <label for="email" class="form-label">Adresse Email</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                                </path>
                                <polyline points="22,6 12,13 2,6"></polyline>
                            </svg>
                            <input type="email" id="email" name="email" class="form-input" placeholder="E-mail"
                                required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Mot de passe</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <input type="password" id="password" name="password" class="form-input"
                                placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember" id="remember">
                            <span>Se souvenir de moi</span>
                        </label>
                        <a href="https://streamable.com/lf027o?src=player-page-share" class="forgot-password"
                            target="_blank">Mot de passe oublié?</a>
                    </div>

                    <button type="submit" class="submit-button">Se connecter</button>

                </form>


                <div class="footer-links">
                    <p>Version: 1.0 | <a href="#">Mentions légales</a> | <a href="#">Politique de confidentialité</a>
                    </p>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
