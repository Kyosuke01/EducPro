  <script>
    // Get user info from session or URL params
    function getUserInfo() {
      const params = new URLSearchParams(window.location.search);
      const role = localStorage.getItem('role') || params.get('role') || 'admin';
      const name = localStorage.getItem('name') || 'Admin';
      const email = localStorage.getItem('email') || 'admin@educpro.com';
      return { role, name, email };
    }

    // Generate sidebar menu based on role
    function generateSidebarMenu(role) {
      const menus = {
        admin: [
          { icon: 'ri-home-4-line', label: 'Tableau de Bord', id: 'dashboard' },
          { icon: 'ri-graduation-cap-line', label: 'Étudiants', id: 'students' },
          { icon: 'ri-user-follow-line', label: 'Professeurs', id: 'teachers' },
          { icon: 'ri-book-2-line', label: 'Classes', id: 'classes' },
          { icon: 'ri-calendar-check-line', label: 'Emploi du Temps', id: 'schedule' }
        ],
        teacher: [
          { icon: 'ri-home-4-line', label: 'Tableau de Bord', id: 'dashboard' },
          { icon: 'ri-book-2-line', label: 'Mes Classes', id: 'myClasses' },
          { icon: 'ri-file-list-line', label: 'Évaluations', id: 'evaluations' },
          { icon: 'ri-calendar-check-line', label: 'Mon Emploi du Temps', id: 'mySchedule' },
          { icon: 'ri-pencil-line', label: 'Saisir les Notes', id: 'grades' }
        ],
        student: [
          { icon: 'ri-home-4-line', label: 'Tableau de Bord', id: 'dashboard' },
          { icon: 'ri-star-line', label: 'Mes Notes', id: 'myGrades' },
          { icon: 'ri-calendar-check-line', label: 'Mon Emploi du Temps', id: 'mySchedule' }
        ]
      };

      const menuItems = menus[role] || menus.student;
      let html = '';

      menuItems.forEach(item => {
        html += `
          <li class="dropdown">
            <a href="javascript:void(0)" class="sidebar-menu-item" data-section="${item.id}" onclick="loadSection('${item.id}', event)">
              <i class="${item.icon}"></i>
              <span>${item.label}</span>
            </a>
          </li>
        `;
      });

      document.getElementById('sidebarMenu').innerHTML = html;
    }

    // Load section content
    function loadSection(sectionId, event) {
      event?.preventDefault?.();

      // Update active menu item
      document.querySelectorAll('.sidebar-menu-item').forEach(item => {
        item.classList.remove('active');
      });
      event?.target?.closest('.sidebar-menu-item')?.classList.add('active');

      const user = getUserInfo();
      let html = '';

      switch (sectionId) {
        case 'dashboard':
          html = getDashboardContent(user.role);
          document.getElementById('pageTitle').textContent = 'Tableau de Bord';
          break;
        case 'students':
          html = getStudentsContent();
          document.getElementById('pageTitle').textContent = 'Gestion des Étudiants';
          break;
        case 'teachers':
          html = getTeachersContent();
          document.getElementById('pageTitle').textContent = 'Gestion des Professeurs';
          break;
        case 'classes':
          html = getClassesContent();
          document.getElementById('pageTitle').textContent = 'Gestion des Classes';
          break;
        case 'schedule':
        case 'mySchedule':
          html = getScheduleContent();
          document.getElementById('pageTitle').textContent = 'Emploi du Temps';
          break;
        case 'myClasses':
          html = getMyClassesContent();
          document.getElementById('pageTitle').textContent = 'Mes Classes';
          break;
        case 'evaluations':
          html = getEvaluationsContent();
          document.getElementById('pageTitle').textContent = 'Évaluations';
          break;
        case 'grades':
          html = getGradesContent();
          document.getElementById('pageTitle').textContent = 'Saisir les Notes';
          break;
        case 'myGrades':
          html = getMyGradesContent();
          document.getElementById('pageTitle').textContent = 'Mes Notes';
          break;
        default:
          html = getDashboardContent(user.role);
      }

      document.getElementById('contentArea').innerHTML = html;
    }

    // Dashboard content based on role
    function getDashboardContent(role) {
      const stats = {
        admin: [
          { title: 'Total Étudiants', value: '2,450', icon: 'ri-graduation-cap-line', color: 'warning-600', percentage: '+10%' },
          { title: 'Total Professeurs', value: '125', icon: 'ri-user-follow-line', color: 'blue-600', percentage: '+5%' },
          { title: 'Total Classes', value: '45', icon: 'ri-book-2-line', color: 'purple-600', percentage: '+2%' },
          { title: 'Taux Présence', value: '92%', icon: 'ri-calendar-check-line', color: 'success-600', percentage: '+8%' }
        ],
        teacher: [
          { title: 'Mes Classes', value: '5', icon: 'ri-book-2-line', color: 'warning-600', percentage: '+0%' },
          { title: 'Total Étudiants', value: '120', icon: 'ri-graduation-cap-line', color: 'blue-600', percentage: '+5%' },
          { title: 'Évaluations', value: '8', icon: 'ri-file-list-line', color: 'purple-600', percentage: '+2%' },
          { title: 'Taux Présence', value: '94%', icon: 'ri-calendar-check-line', color: 'success-600', percentage: '+3%' }
        ],
        student: [
          { title: 'Moyenne Générale', value: '14.5', icon: 'ri-star-line', color: 'warning-600', percentage: '+0.5' },
          { title: 'Mes Classes', value: '6', icon: 'ri-book-2-line', color: 'blue-600', percentage: '+0%' },
          { title: 'Absences', value: '3', icon: 'ri-calendar-x-line', color: 'danger-600', percentage: '-1' },
          { title: 'Taux Présence', value: '95%', icon: 'ri-calendar-check-line', color: 'success-600', percentage: '+2%' }
        ]
      };

      const cards = stats[role] || stats.student;
      let html = '<div class="row gy-4"><div class="col-xxl-12"><div class="row gy-4">';

      cards.forEach((card, idx) => {
        html += `
          <div class="col-xxl-3 col-sm-6">
            <div class="card shadow-1 radius-8 h-100">
              <div class="card-body p-20">
                <div class="d-flex flex-wrap align-items-center gap-3 mb-16">
                  <div class="w-44-px h-44-px bg-${card.color} rounded-circle d-flex justify-content-center align-items-center text-white">
                    <i class="${card.icon} text-xl"></i>
                  </div>
                  <p class="fw-medium text-primary-light mb-1">${card.title}</p>
                </div>
                <h6 class="mb-0">${card.value}</h6>
                <p class="fw-medium text-sm text-primary-light mt-12 mb-0">
                  <span class="text-success-600 text-sm fw-semibold">${card.percentage}</span>
                </p>
              </div>
            </div>
          </div>
        `;
      });

      html += '</div></div></div>';
      return html;
    }

                        <td>Mathématiques</td>
                        <td>1ère S</td>
                        <td>16/20</td>
                        <td>15.5/20</td>
                        <td><span class="badge bg-success">Excellent</span></td>
                      </tr>
                      <tr>
                        <td>Français</td>
                        <td>1ère S</td>
                        <td>14/20</td>
                        <td>14/20</td>
                        <td><span class="badge bg-success">Bon</span></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // Initialize
    function init() {
      const user = getUserInfo();

      // Update user info in sidebar
      document.getElementById('userName').textContent = user.name;
      document.getElementById('userRole').textContent =
        user.role === 'admin' ? 'Administrateur' :
          user.role === 'teacher' ? 'Professeur' : 'Étudiant';
      document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();

      // Generate sidebar menu
      generateSidebarMenu(user.role);

      // Load default dashboard
      loadSection('dashboard', { preventDefault: () => { } });

      // Set first menu item as active
      document.querySelector('.sidebar-menu-item')?.classList.add('active');
    }

    // Initialize on page load
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>

</html>
