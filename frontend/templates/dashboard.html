  <!-- Scripts -->
  <script src="/static/assets/js/lib/iconify-icon.min.js"></script>
  <script src="/static/assets/js/lib/jquery-3.7.1.min.js"></script>
  <script src="/static/assets/js/lib/bootstrap.bundle.min.js"></script>
  <script src="/static/assets/js/lib/apexcharts.min.js"></script>
  <script src="/static/assets/js/lib/jsvectormap.min.js"></script>
  <script src="/static/assets/js/lib/moment.min.js"></script>
  <script src="/static/assets/js/lib/calendar.js"></script>
  <script src="/static/assets/js/lib/apexcharts-setting.js"></script>
  <script src="/static/assets/js/main.js"></script>

  <!-- Injection sécurisée des données utilisateur pour le Linter JS -->
  <script id="user-data" type="application/json">
    {{ {
      "id": user_id,
      "firstName": first_name,
      "lastName": last_name,
      "email": email,
      "role": role,
      "className": class_name,
      "topicName": topic_name
    } | tojson | safe }}
  </script>

  <script>
    // ============================================
    // User info extraite proprement
    // ============================================
    const userDataElement = document.getElementById('user-data');
    const USER = userDataElement && userDataElement.textContent.trim() !== ''
      ? JSON.parse(userDataElement.textContent)
      : {};

    // ============================================
    // API helper
    // ============================================
    async function api(path, options = {}) {
      try {
        const resp = await fetch(`/api/${path}`, {
          headers: { 'Content-Type': 'application/json' },
          ...options
        });

        const contentType = resp.headers.get("content-type");
        if (contentType && contentType.indexOf("application/json") !== -1) {
          return await resp.json();
        } else {
          const text = await resp.text();
          return { error: `Réponse inattendue (non-JSON): ${text.substring(0, 50)}...` };
        }
      } catch (e) {
        console.error('API Error:', e);
        return { error: e.message };
      }
    }

    // ============================================
    // Sidebar menu based on role
    // ============================================
    function generateSidebarMenu(role) {
      const menus = {
        admin: [
          { icon: 'ri-home-4-line', label: 'Tableau de Bord', id: 'dashboard' },
          { icon: 'ri-graduation-cap-line', label: 'Étudiants', id: 'students' },
          { icon: 'ri-user-follow-line', label: 'Professeurs', id: 'teachers' },
          { icon: 'ri-book-2-line', label: 'Classes', id: 'classes' },
          { icon: 'ri-calendar-check-line', label: 'Emploi du Temps', id: 'schedule' },
          { icon: 'ri-chat-3-line', label: 'Messagerie', id: 'messages' }
        ],
        teacher: [
          { icon: 'ri-home-4-line', label: 'Tableau de Bord', id: 'dashboard' },
          { icon: 'ri-book-2-line', label: 'Mes Classes', id: 'myClasses' },
          { icon: 'ri-file-list-line', label: 'Évaluations', id: 'evaluations' },
          { icon: 'ri-user-follow-line', label: 'Saisir les Absences', id: 'teacherAttendance' },
          { icon: 'ri-calendar-check-line', label: 'Mon Emploi du Temps', id: 'mySchedule' },
          { icon: 'ri-pencil-line', label: 'Saisir les Notes', id: 'grades' },
          { icon: 'ri-chat-3-line', label: 'Messagerie', id: 'messages' }
        ],
        student: [
          { icon: 'ri-home-4-line', label: 'Tableau de Bord', id: 'dashboard' },
          { icon: 'ri-star-line', label: 'Mes Notes', id: 'myGrades' },
          { icon: 'ri-calendar-check-line', label: 'Mon Emploi du Temps', id: 'mySchedule' },
          { icon: 'ri-user-line', label: 'Mon Assiduité', id: 'myAttendance' },
          { icon: 'ri-chat-3-line', label: 'Messagerie', id: 'messages' }
        ]
      };

      const menuItems = menus[role] || menus.student;
      let html = '';

      menuItems.forEach(item => {
        html += `
          <li class="dropdown">
            <a href="javascript:void(0)" class="sidebar-menu-item" data-section="${item.id}" onclick="loadSection('${item.id}', event)">
              <i class="${item.icon}"></i>
              <span>${item.label}</span>
            </a>
          </li>
        `;
      });

      document.getElementById('sidebarMenu').innerHTML = html;
    }

    // ============================================
    // Section loader
    // ============================================
    async function loadSection(sectionId, event) {
      event?.preventDefault?.();

      // Update active menu item
      document.querySelectorAll('.sidebar-menu-item').forEach(item => {
        item.classList.remove('active');
      });
      if (event?.target) {
        event.target.closest('.sidebar-menu-item')?.classList.add('active');
      } else {
        document.querySelector(`[data-section="${sectionId}"]`)?.classList.add('active');
      }

      const contentArea = document.getElementById('contentArea');
      contentArea.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Chargement...</span></div></div>';

      let html = '';

      switch (sectionId) {
        case 'dashboard':
          html = await getDashboardContent();
          document.getElementById('pageTitle').textContent = 'Tableau de Bord';
          document.getElementById('pageSubtitle').textContent = `Bienvenue, ${USER.firstName} ${USER.lastName}`;
          break;
        case 'students':
          html = await getStudentsContent();
          document.getElementById('pageTitle').textContent = 'Gestion des Étudiants';
          document.getElementById('pageSubtitle').textContent = 'Liste de tous les étudiants';
          break;
        case 'teachers':
          html = await getTeachersContent();
          document.getElementById('pageTitle').textContent = 'Gestion des Professeurs';
          document.getElementById('pageSubtitle').textContent = 'Liste de tous les professeurs';
          break;
        case 'classes':
          html = await getClassesContent();
          document.getElementById('pageTitle').textContent = 'Gestion des Classes';
          document.getElementById('pageSubtitle').textContent = 'Liste de toutes les classes';
          break;
        case 'schedule':
          html = await getScheduleContent();
          document.getElementById('pageTitle').textContent = 'Emploi du Temps';
          document.getElementById('pageSubtitle').textContent = 'Emplois du temps de toutes les classes';
          break;
        case 'mySchedule':
          html = await getMyScheduleContent();
          document.getElementById('pageTitle').textContent = 'Mon Emploi du Temps';
          document.getElementById('pageSubtitle').textContent = '';
          break;
        case 'myClasses':
          html = await getMyClassesContent();
          document.getElementById('pageTitle').textContent = 'Mes Classes';
          document.getElementById('pageSubtitle').textContent = '';
          break;
        case 'evaluations':
          html = await getEvaluationsContent();
          document.getElementById('pageTitle').textContent = 'Évaluations';
          document.getElementById('pageSubtitle').textContent = 'Notes par matière';
          break;
        case 'grades':
          html = await getGradesContent();
          document.getElementById('pageTitle').textContent = 'Saisir les Notes';
          document.getElementById('pageSubtitle').textContent = '';
          break;
        case 'myGrades':
          html = await getMyGradesContent();
          document.getElementById('pageTitle').textContent = 'Mes Notes';
          document.getElementById('pageSubtitle').textContent = '';
          break;
        case 'myAttendance':
          html = await getMyAttendanceContent();
          document.getElementById('pageTitle').textContent = 'Mon Assiduité';
          document.getElementById('pageSubtitle').textContent = '';
          break;
        case 'teacherAttendance':
          html = await getTeacherAttendanceContent();
          document.getElementById('pageTitle').textContent = 'Saisir les Absences';
          document.getElementById('pageSubtitle').textContent = '';
          break;
        case 'messages':
          html = await getMessagesContent();
          document.getElementById('pageTitle').textContent = 'Messagerie';
          document.getElementById('pageSubtitle').textContent = 'Communiquer et gérer les tickets';
          break;
        default:
          html = await getDashboardContent();
      }

      contentArea.innerHTML = html;

      // Initialize ApexCharts if Dashboard is loaded
      if (sectionId === 'dashboard' || sectionId === undefined) {
        if (typeof renderDashboardCharts === 'function') {
          renderDashboardCharts();
        }
      }
    }

    // ============================================
    // DASHBOARD — Stats dynamiques
    // ============================================
    async function getDashboardContent() {
      try {
        if (USER.role === 'admin') {
          const [studentsData, teachersData, classesData] = await Promise.all([
            api('students'),
            api('teachers'),
            api('classes')
          ]);
          const nbStudents = (studentsData && studentsData.students) ? studentsData.students.length : 0;
          const nbTeachers = (teachersData && teachersData.teachers) ? teachersData.teachers.length : 0;
          const nbClasses = (classesData && classesData.classes) ? classesData.classes.length : 0;

          // Prepare Chart Data
          window.dashboardChartData = {
            role: 'admin',
            categories: ['Étudiants', 'Professeurs', 'Classes'],
            series: [{ name: 'Total', data: [nbStudents, nbTeachers, nbClasses] }]
          };

          const statsHtml = buildStatsCards([
            { title: 'Total Étudiants', value: nbStudents, icon: 'ri-graduation-cap-line', color: 'warning-600' },
            { title: 'Total Professeurs', value: nbTeachers, icon: 'ri-user-follow-line', color: 'blue-600' },
            { title: 'Total Classes', value: nbClasses, icon: 'ri-book-2-line', color: 'purple-600' },
            { title: 'Plateforme', value: 'Active', icon: 'ri-check-double-line', color: 'success-600' }
          ]);
          return statsHtml + buildChartContainer('Répartition de la plateforme') + buildRecentActivityTable();

        } else if (USER.role === 'teacher') {
          const edtData = await api(`edt/teacher/${encodeURIComponent(USER.lastName || '')}`);
          const edtList = (edtData && edtData.edt) ? edtData.edt : [];
          const nbSlots = edtList.length;
          const uniqueClasses = [...new Set(edtList.map(e => e.class_name))].length;

          window.dashboardChartData = {
            role: 'teacher',
            categories: ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi'],
            series: [{ name: 'Heures de cours', data: [4, 6, 2, 8, 4] }] // mock timeline
          };

          const statsHtml = buildStatsCards([
            { title: 'Mes Créneaux', value: nbSlots, icon: 'ri-calendar-line', color: 'warning-600' },
            { title: 'Mes Classes', value: uniqueClasses, icon: 'ri-book-2-line', color: 'blue-600' },
            { title: 'Matière', value: USER.topicName || '-', icon: 'ri-file-list-line', color: 'purple-600' },
            { title: 'Statut', value: 'Actif', icon: 'ri-check-double-line', color: 'success-600' }
          ]);
          return statsHtml + buildChartContainer('Heures de cours par jour de la semaine') + buildRecentActivityTable();

        } else {
          // Student
          const [gradesData, attendanceData] = await Promise.all([
            api(`grades/student/${USER.id}`),
            api(`attendance/student/${USER.id}`)
          ]);

          const grades = (gradesData && gradesData.grades) ? gradesData.grades : [];
          const avg = grades.length > 0 ? (grades.reduce((s, g) => s + g.grade, 0) / grades.length).toFixed(1) : '-';
          const att = (attendanceData && attendanceData.attendance && attendanceData.attendance.length > 0)
            ? attendanceData.attendance[0]
            : { late: 0, absent: 0 };

          window.dashboardChartData = {
            role: 'student',
            categories: grades.map(g => g.topic_name.substring(0, 6)),
            series: [{ name: 'Mes Notes', data: grades.map(g => g.grade) }]
          };

          const statsHtml = buildStatsCards([
            { title: 'Moyenne Générale', value: avg + '/20', icon: 'ri-star-line', color: 'warning-600' },
            { title: 'Classe', value: USER.className || '-', icon: 'ri-book-2-line', color: 'blue-600' },
            { title: 'Absences', value: att.absent || 0, icon: 'ri-calendar-x-line', color: 'danger-600' },
            { title: 'Retards', value: att.late || 0, icon: 'ri-time-line', color: 'purple-600' }
          ]);
          return statsHtml + buildChartContainer('Évolution de mes notes récentes') + buildRecentActivityTable();
        }
      } catch (e) {
        return `<div class="alert alert-danger">Erreur de chargement du dashboard : ${e.message}</div>`;
      }
    }

    function buildStatsCards(cards) {
      let html = '<div class="row gy-4"><div class="col-xxl-12"><div class="row gy-4">';
      cards.forEach(card => {
        html += `
          <div class="col-xxl-3 col-sm-6">
            <div class="card shadow-1 radius-8 h-100">
              <div class="card-body p-20">
                <div class="d-flex flex-wrap align-items-center gap-3 mb-16">
                  <div class="w-44-px h-44-px bg-${card.color} rounded-circle d-flex justify-content-center align-items-center text-white">
                    <i class="${card.icon} text-xl"></i>
                  </div>
                  <p class="fw-medium text-primary-light mb-1">${card.title}</p>
                </div>
                <h6 class="mb-0">${card.value}</h6>
              </div>
            </div>
          </div>
        `;
      });
      html += '</div></div></div>';
      return html;
    }

    function buildChartContainer(title) {
      return `
        <div class="row mt-4">
          <div class="col-12">
            <div class="card shadow-1 radius-12">
              <div class="card-body p-24">
                <h6 class="text-lg fw-semibold mb-20"><i class="ri-bar-chart-fill text-primary me-2"></i>${title}</h6>
                <div id="mainChart" style="min-height: 300px;"></div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function buildRecentActivityTable() {
      // Fake recent activities for better dashboard density.
      return `
        <div class="row mt-4">
          <div class="col-12">
            <div class="card shadow-1 radius-12">
              <div class="card-header border-bottom bg-white p-24">
                <h6 class="text-lg fw-semibold mb-0"><i class="ri-history-line text-warning me-2"></i>Activités Récentes</h6>
              </div>
              <div class="card-body p-0">
                <div class="table-responsive">
                  <table class="table table-hover table-borderless mb-0">
                    <thead class="bg-neutral-50 border-bottom text-neutral-500 text-xs text-uppercase fw-semibold">
                      <tr>
                        <th class="ps-24 py-16">Action</th>
                        <th class="py-16">Détail</th>
                        <th class="py-16">Date</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr class="align-middle">
                        <td class="ps-24">
                          <div class="d-flex align-items-center gap-3">
                            <div class="w-40-px h-40-px rounded-circle bg-success-100 text-success-600 d-flex justify-content-center align-items-center">
                              <i class="ri-login-circle-line text-lg"></i>
                            </div>
                            <h6 class="text-sm fw-medium mb-0">Connexion Réussie</h6>
                          </div>
                        </td>
                        <td><span class="text-xs text-neutral-500">IP: 192.168.1.1 - Localhost</span></td>
                        <td><span class="badge bg-neutral-100 text-neutral-600 px-12 py-6 rounded-pill">Aujourd'hui</span></td>
                      </tr>
                      <tr class="align-middle">
                        <td class="ps-24">
                          <div class="d-flex align-items-center gap-3">
                            <div class="w-40-px h-40-px rounded-circle bg-primary-100 text-primary-600 d-flex justify-content-center align-items-center">
                              <i class="ri-file-text-line text-lg"></i>
                            </div>
                            <h6 class="text-sm fw-medium mb-0">Mise à jour du système</h6>
                          </div>
                        </td>
                        <td><span class="text-xs text-neutral-500">Mise en place du format utf8mb4</span></td>

    async function loadGradeStudents() {
      const className = document.getElementById('gradeClassSelect').value;
      const area = document.getElementById('gradeStudentsArea');
      if (!className) { area.innerHTML = ''; return; }

      const data = await api(`classes/${encodeURIComponent(className)}/students`);
      const students = data.students || [];

      let rows = '';
      students.forEach(s => {
        rows += `
          <tr>
            <td>${s.last_name} ${s.first_name}</td>
            <td><input type="number" class="form-control form-control-sm grade-input" data-student-id="${s.student_id}" min="0" max="20" step="0.5"></td>
          </tr>
        `;
      });

      area.innerHTML = `
        <div class="table-responsive mt-3">
          <table class="table">
            <thead><tr><th>Étudiant</th><th>Note / 20</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <button class="btn btn-primary mt-3" onclick="submitGrades()">Enregistrer les Notes</button>
        <div id="gradeMessage" class="mt-2"></div>
      `;
    }

    async function submitGrades() {
      const topicName = document.getElementById('gradeTopicInput').value;
      const inputs = document.querySelectorAll('.grade-input');
      const msgEl = document.getElementById('gradeMessage');
      let count = 0;

      for (const input of inputs) {
        const val = parseFloat(input.value);
        if (!isNaN(val)) {
          const studentId = parseInt(input.dataset.studentId);
          await api('grades', {
            method: 'POST',
            body: JSON.stringify({ grade: val, student_id: studentId, topic_name: topicName })
          });
          count++;
        }
      }

      if (count > 0) {
        msgEl.innerHTML = `<div class="alert alert-success">${count} note(s) enregistrée(s) avec succès.</div>`;
      } else {
        msgEl.innerHTML = '<div class="alert alert-warning">Aucune note à enregistrer.</div>';
      }
    }

    // ============================================
    // MES NOTES (Student)
    // ============================================
    async function getMyGradesContent() {
      const data = await api(`grades/student/${USER.id}`);
      const grades = data.grades || [];

      // Calculate average per topic
      const byTopic = {};
      grades.forEach(g => {
        if (!byTopic[g.topic_name]) byTopic[g.topic_name] = [];
        byTopic[g.topic_name].push(g.grade);
      });

      let rows = '';
      for (const [topic, notes] of Object.entries(byTopic)) {
        const avg = (notes.reduce((s, n) => s + n, 0) / notes.length).toFixed(1);
        const statusClass = avg >= 14 ? 'bg-success' : avg >= 10 ? 'bg-warning' : 'bg-danger';
        const statusText = avg >= 14 ? 'Bon' : avg >= 10 ? 'Moyen' : 'Insuffisant';
        notes.forEach(note => {
          rows += `
            <tr>
              <td>${topic}</td>
              <td>${USER.className}</td>
              <td>${note}/20</td>
              <td>${avg}/20</td>
              <td><span class="badge ${statusClass}">${statusText}</span></td>
            </tr>
          `;
        });
      }

      if (!rows) rows = '<tr><td colspan="5" class="text-center text-muted">Aucune note trouvée</td></tr>';

      const allGrades = grades.map(g => g.grade);
      const globalAvg = allGrades.length > 0 ? (allGrades.reduce((s, n) => s + n, 0) / allGrades.length).toFixed(1) : '-';

      return `
        <div class="row">
          <div class="col-12 mb-3">
            <div class="card bg-primary-600 text-white">
              <div class="card-body p-20">
                <h6 class="text-white mb-1">Moyenne Générale</h6>
                <h3 class="text-white mb-0">${globalAvg}/20</h3>
              </div>
            </div>
          </div>
          <div class="col-12">
            <div class="card">
              <div class="card-body p-20">
                <h6 class="text-lg fw-semibold mb-20">Mes Notes</h6>
                <div class="table-responsive">
                  <table class="table table-hover">
                    <thead>
                      <tr>
                        <th>Matière</th>
                        <th>Classe</th>
                        <th>Note</th>
                        <th>Moyenne</th>
                        <th>Statut</th>
                      </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

              </div>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="card shadow-1 radius-8 h-100">
              <div class="card-body p-20 text-center">
                <div class="w-64-px h-64-px bg-warning-600 rounded-circle d-flex justify-content-center align-items-center text-white mx-auto mb-12">
                  <i class="ri-time-line text-2xl"></i>
                </div>
                <h3>${att.late}</h3>
                <p class="text-secondary-light">Retards</p>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ============================================
    // INIT
    // ============================================
    function init() {
      // Update user info in sidebar
      document.getElementById('userName').textContent = `${USER.firstName} ${USER.lastName}`;
      document.getElementById('userRole').textContent =
        USER.role === 'admin' ? 'Administrateur' :
          USER.role === 'teacher' ? 'Professeur' : 'Étudiant';
      document.getElementById('userAvatar').textContent = USER.firstName.charAt(0).toUpperCase();

      // Generate sidebar menu
      generateSidebarMenu(USER.role);

      // Load default dashboard
      loadSection('dashboard', { preventDefault: () => { } });
    }

    // ============================================
    // RÉCAP ASSIDUITÉ (Teacher)
    // ============================================
    async function getTeacherAttendanceContent() {
      const edtData = await api(`edt/teacher/${encodeURIComponent(USER.lastName)}`);
      const edtList = edtData.edt || [];
      const uniqueClasses = [...new Set(edtList.map(e => e.class_name))];

      let classOptions = '<option value="">Sélectionnez une classe</option>';
      uniqueClasses.forEach(cls => {
        classOptions += `<option value="${cls}">${cls}</option>`;
      });

      return `
        <div class="row">
          <div class="col-12">
            <div class="card">
              <div class="card-body p-20">
                <h6 class="text-lg fw-semibold mb-20">Saisir les Absences / Retards</h6>
                <div class="row mb-3">
                  <div class="col-md-6">
                    <label class="form-label">Classe</label>
                    <select class="form-select" id="attClassSelect" onchange="loadAttendanceStudents()">
                      ${classOptions}
                    </select>
                  </div>
                </div>
                <div id="attStudentsArea"></div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    async function loadAttendanceStudents() {
      const className = document.getElementById('attClassSelect').value;
      const area = document.getElementById('attStudentsArea');
      if (!className) { area.innerHTML = ''; return; }

      const data = await api(`classes/${encodeURIComponent(className)}/students`);
      const students = data.students || [];

      let rows = '';
      students.forEach(s => {
        rows += `
          <tr>
            <td>${s.last_name} ${s.first_name}</td>
            <td>
              <div class="d-flex gap-2">
                <button class="btn btn-xs btn-outline-warning" onclick="markAttendance(${s.student_id}, 1, 0, this)">+1 Retard</button>
                <button class="btn btn-xs btn-outline-danger" onclick="markAttendance(${s.student_id}, 0, 1, this)">+1 Absence</button>
              </div>
            </td>
          </tr>
        `;
      });

      area.innerHTML = `
        <div class="table-responsive mt-3">
          <table class="table">
            <thead><tr><th>Étudiant</th><th>Action</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div id="attMessage" class="mt-2"></div>
      `;
    }

    async function markAttendance(studentId, late, absent, btn) {
      btn.disabled = true;
      const res = await api('attendance', {
        method: 'POST',
        body: JSON.stringify({ student_id: studentId, late, absent })
      });

      if (!res.error) {
        const msgEl = document.getElementById('attMessage');
        msgEl.innerHTML = `<div class="alert alert-success">Action enregistrée pour l'étudiant #${studentId}</div>`;
        setTimeout(() => msgEl.innerHTML = '', 2000);
      }
      btn.disabled = false;
    }
    // ============================================
    // INIT
    // ============================================
    function init() {
      // Update user info in sidebar
      document.getElementById('userName').textContent = `${USER.firstName} ${USER.lastName}`;
      document.getElementById('userRole').textContent =
        USER.role === 'admin' ? 'Administrateur' :
          USER.role === 'teacher' ? 'Professeur' : 'Étudiant';
      document.getElementById('userAvatar').textContent = USER.firstName ? USER.firstName.charAt(0).toUpperCase() : 'U';

      // Generate sidebar menu
      generateSidebarMenu(USER.role);

      // Load default dashboard
      loadSection('dashboard', { preventDefault: () => { } });
    }

    // ============================================
    // APPLICATIF: Messagerie
    // ============================================
    async function getMessagesContent() {
      let endpoint = USER.role === 'teacher' ? `messages/teacher/${USER.id}` : `messages/student/${USER.id}`;
      let contactsData = [];

      try {
        const messagesData = await api(endpoint);
        const messages = messagesData.messages || [];

        // Obtenir la liste des destinataires potentiels
        if (USER.role === 'student' || USER.role === 'admin') {
          const tData = await api('teachers');
          contactsData = tData.teachers || [];
        } else {
          // Simplification pour le prof : on liste tous les étudiants de la plateforme
          const sData = await api('students');
          contactsData = sData.students || [];
        }

        let contactOptions = '<option value="">-- Sélectionnez un destinataire --</option>';
        contactsData.forEach(c => {
          let cid = USER.role === 'teacher' ? c.student_id : c.teacher_id;
          contactOptions += `<option value="${cid}">${c.first_name} ${c.last_name} ${c.topic_name ? '(' + c.topic_name + ')' : ''}</option>`;
        });

        let msgHtml = '';
        if (messages.length === 0) {
          msgHtml = '<div class="text-center text-muted py-24"><i class="ri-chat-3-line text-4xl mb-3 d-block"></i>Aucun message récent.</div>';
        } else {
          messages.forEach(m => {
            const isMe = (USER.role === 'teacher' && m.teacher_id === USER.id) || (USER.role === 'student' && m.student_id === USER.id);
            // Pour simplifier l'affichage bidirectionnel avec le format actuel de TICKET
            // On affiche simplement tous les tickets impliquant l'utilisateur
            const senderName = USER.role === 'teacher' ? `${m.student_first_name} ${m.student_last_name}` : `${m.teacher_first_name} ${m.teacher_last_name}`;

            msgHtml += `
              <div class="d-flex align-items-start gap-3 mb-24 ${false ? 'flex-row-reverse' : ''}">
                <div class="w-40-px h-40-px rounded-circle bg-primary-100 text-primary-600 d-flex justify-content-center align-items-center fw-bold flex-shrink-0">
                  ${senderName.charAt(0)}
                </div>
                <div class="bg-neutral-50 p-16 radius-12 shadow-1" style="max-width: 80%;">
                  <div class="d-flex justify-content-between align-items-center mb-8">
                    <h6 class="text-sm fw-semibold mb-0">${senderName}</h6>
                    <span class="text-xs text-neutral-400 ms-3">Ticket #${m.ticket_id}</span>
                  </div>
                  <p class="text-neutral-600 text-sm mb-0">${m.msg_content}</p>
                </div>
              </div>
            `;
          });
        }

        return `
          <div class="row">
            <!-- Historique des Messages -->
            <div class="col-lg-8">
              <div class="card shadow-1 min-h-400-px">
                <div class="card-header border-bottom bg-white d-flex justify-content-between align-items-center">
                  <h6 class="mb-0 text-lg fw-semibold">Historique des communications</h6>
                </div>
                <div class="card-body p-24" style="max-height: 500px; overflow-y: auto;">
                  ${msgHtml}
                </div>
              </div>
            </div>

            <!-- Nouveau Message -->
            <div class="col-lg-4">
              <div class="card shadow-1">
                <div class="card-header border-bottom bg-white">
                  <h6 class="mb-0 text-lg fw-semibold">Nouveau Ticket</h6>
                </div>
                <div class="card-body p-24">
                  <div class="mb-3">
                    <label class="form-label text-sm fw-medium">Destinataire</label>
                    <select id="msgRecipient" class="form-select radius-8 bg-neutral-50 border-0 p-12">
                      ${contactOptions}
                    </select>
                  </div>
                  <div class="mb-4">
                    <label class="form-label text-sm fw-medium">Message</label>
                    <textarea id="msgContent" class="form-control radius-8 bg-neutral-50 border-0 p-12" rows="4" placeholder="Saisissez votre demande..."></textarea>
                  </div>
                  <button class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2" onclick="sendMessage()">
                    <i class="ri-send-plane-fill"></i> Envoyer
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;
      } catch (e) {
        return `<div class="alert alert-danger">Erreur chargement messagerie : ${e.message}</div>`;
      }
    }

    async function sendMessage() {
      const recipientId = document.getElementById('msgRecipient').value;
      const content = document.getElementById('msgContent').value;

      if (!recipientId || !content.trim()) {
        alert("Veuillez sélectionner un destinataire et écrire un message.");
        return;
      }

      const payload = {
        msg_content: content.trim(),
        teacher_id: USER.role === 'teacher' ? USER.id : parseInt(recipientId),
        student_id: USER.role === 'student' ? USER.id : parseInt(recipientId)
      };

      try {
        const resp = await api('messages', {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        if (resp.success) {
          loadSection('messages'); // recharge la vue
        } else {
          alert(resp.error || "Erreur lors de l'envoi");
        }
      } catch (e) {
        alert("Erreur réseau");
      }
    }

    // Initialize on page load
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>

</html>
