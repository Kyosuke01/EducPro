<!DOCTYPE html>
<html lang="fr" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EducPro - Tableau de Bord</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%234f46e5'/%3E%3Ctext x='50%25' y='55%25' font-family='Arial' font-size='28' text-anchor='middle' fill='white' font-weight='700'%3EE%3C/text%3E%3C/svg%3E">

  <!-- CSS Libraries -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/assets/css/lib/bootstrap.min.css">
  <link rel="stylesheet" href="/static/assets/css/lib/apexcharts.css">
  <link rel="stylesheet" href="/static/assets/css/lib/dataTables.min.css">
  <link rel="stylesheet" href="/static/assets/css/lib/flatpickr.min.css">
  <link rel="stylesheet" href="/static/assets/css/lib/calendar.css">
  <link rel="stylesheet" href="/static/assets/css/style.css">
  <link rel="stylesheet" href="/static/assets/css/sections.css">

  <style>
    /* Override logo display */
    .logo-icon {
      display: none !important;
    }

    .light-logo {
      display: block;
    }

    .dark-logo {
      display: none;
    }

    html[data-theme="dark"] .light-logo {
      display: none;
    }

    html[data-theme="dark"] .dark-logo {
      display: block;
    }

    .param-modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1100;
      padding: 16px;
    }

    .param-modal__card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.25);
    }
  </style>
</head>

<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <button type="button" class="sidebar-close-btn">
      <i class="ri-close-2-line"></i>
    </button>

    <div class="sidebar-logo d-flex align-items-center justify-content-between">
      <a href="#" class="">
        <img src="/static/assets/images/logo/Educpro LOGO.png" alt="EducPro" class="light-logo"
          style="max-height: 40px;">
        <img src="/static/assets/images/logo/Educpro LOGO.png" alt="EducPro" class="dark-logo"
          style="max-height: 40px;">
      </a>
      <button type="button" class="text-xxl d-xl-flex d-none line-height-1 sidebar-toggle text-neutral-500"
        aria-label="Collapse Sidebar">
        <i class="ri-contract-left-line"></i>
      </button>
    </div>

    <!-- User Profile -->
    <div class="mx-16 py-12">
      <div class="dropdown profile-dropdown">
        <button type="button"
          class="profile-dropdown__button d-flex align-items-center justify-content-between p-10 w-100 overflow-hidden bg-neutral-50 radius-12"
          data-bs-toggle="dropdown">
          <span class="d-flex align-items-start gap-10">
            <div
              class="w-40-px h-40-px rounded-circle bg-primary-600 d-flex align-items-center justify-content-center text-white fw-bold"
              id="userAvatar">A</div>
            <span class="profile-dropdown__contents">
              <span class="h6 mb-0 text-md d-block text-primary-light" id="userName">Admin</span>
              <span class="text-secondary-light text-sm mb-0 d-block" id="userRole">Administrateur</span>
            </span>
          </span>
          <span class="profile-dropdown__icon pe-8 text-xl d-flex line-height-1">
            <i class="ri-arrow-right-s-line"></i>
          </span>
        </button>
        <ul class="dropdown-menu dropdown-menu-lg-end border p-12">
          <li>
            <a href="javascript:void(0)" onclick="loadSection('monProfil')"
              class="dropdown-item rounded text-secondary-light bg-hover-neutral-200 text-hover-neutral-900 d-flex align-items-center gap-2 py-6">
              <i class="ri-user-3-line"></i>
              Mon Profil
            </a>
          </li>
          <li>
            <a href="javascript:void(0)" onclick="loadSection('parametres')"
              class="dropdown-item rounded text-secondary-light bg-hover-neutral-200 text-hover-neutral-900 d-flex align-items-center gap-2 py-6">
              <i class="ri-settings-3-line"></i>
              Paramètres
            </a>
          </li>
          <li>
            <a href="/logout"
              class="dropdown-item rounded text-secondary-light bg-hover-neutral-200 text-hover-neutral-900 d-flex align-items-center gap-2 py-6">
              <i class="ri-shut-down-line"></i>
              Déconnexion
            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- Sidebar Menu -->
    <div class="sidebar-menu-area">
      <ul class="sidebar-menu" id="sidebarMenu">
        <!-- Generated by JavaScript -->
      </ul>
    </div>
  </aside>

  <!-- Main Dashboard -->
  <main class="dashboard-main">
    <!-- Topbar -->
    <div class="navbar-header shadow-1">
      <div class="row align-items-center justify-content-between">
        <div class="col-auto">
          <div class="d-flex flex-wrap align-items-center gap-4">
            <button type="button" class="sidebar-mobile-toggle" aria-label="Sidebar Toggle">
              <iconify-icon icon="heroicons:bars-3-solid" class="icon"></iconify-icon>
            </button>
            <form class="navbar-search">
              <input type="text" class="bg-transparent" name="search" placeholder="Rechercher...">
              <iconify-icon icon="ion:search-outline" class="icon"></iconify-icon>
            </form>
          </div>
        </div>
        <div class="col-auto">
          <div class="d-flex flex-wrap align-items-center gap-3">
            <div class="dropdown">
              <button
                class="has-indicator w-40-px h-40-px bg-neutral-200 rounded-circle d-flex justify-content-center align-items-center position-relative"
                type="button" data-bs-toggle="dropdown">
                <iconify-icon icon="iconoir:bell" class="text-primary-light text-xl"></iconify-icon>
                <span class="w-8-px h-8-px bg-danger-600 position-absolute end-0 top-0 rounded-circle mt-2 me-2"></span>
              </button>
              <ul class="dropdown-menu dropdown-menu-end p-0 shadow-sm border-0 radius-12" id="notificationDropdown"
                style="width: 300px;">
                <div class="p-16 border-bottom">
                  <h6 class="text-md fw-semibold mb-0">Notifications</h6>
                </div>
                <div class="p-16" id="notificationContainer">
                  <!-- Injected by JS -->
                </div>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="dashboard-main-body">
      <div class="breadcrumb d-flex flex-wrap align-items-center justify-content-between gap-3 mb-24">
        <div>
          <h6 class="fw-semibold mb-0" id="pageTitle">Tableau de Bord</h6>
          <p class="text-neutral-600 mt-4 mb-0" id="pageSubtitle">Bienvenue sur votre tableau de bord EducPro</p>
        </div>
      </div>

      <!-- Content Sections -->
      <div id="contentArea">
        <!-- Sections injected here -->
      </div>
    </div>
  </main>

  <!-- Password confirmation modal (2FA) -->
  <div id="password2faModal" class="param-modal" onclick="closePassword2FAModal(true)">
    <div class="param-modal__card" onclick="event.stopPropagation();">
      <h6 class="fw-semibold mb-2">Confirmer avec le code A2F</h6>
      <p class="text-sm text-neutral-500 mb-3">Entrez le code à 6 chiffres depuis votre application d'authentification.
      </p>
      <input type="text" name="password2faCode" class="form-control radius-8 bg-neutral-50 border-0 p-12 mb-3"
        inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000">
      <div class="d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-light" onclick="closePassword2FAModal(true)">Annuler</button>
        <button type="button" class="btn btn-primary" onclick="confirmPasswordChangeWithCode()">Valider</button>
      </div>
    </div>
  </div>

  <!-- ======= SCRIPTS ======= -->
  <!-- Librairies tierces -->
  <script src="/static/assets/js/lib/iconify-icon.min.js"></script>
  <script src="/static/assets/js/lib/jquery-3.7.1.min.js"></script>
  <script src="/static/assets/js/lib/bootstrap.bundle.min.js"></script>
  <script src="/static/assets/js/lib/apexcharts.min.js"></script>
  <script src="/static/assets/js/lib/jsvectormap.min.js"></script>
  <script src="/static/assets/js/lib/moment.min.js"></script>
  <script src="/static/assets/js/lib/calendar.js"></script>
  <script src="/static/assets/js/lib/apexcharts-setting.js"></script>
  <script src="/static/assets/js/app.js"></script>

  <!-- Chargeur de templates HTML -->
  <script src="/static/assets/js/lib/templates.js"></script>

  <!-- Injection sécurisée des données utilisateur -->
  <script id="user-data" type="application/json">
    {{ {
      "id": user_id,
      "firstName": first_name,
      "lastName": last_name,
      "email": email,
      "role": role,
      "className": class_name,
      "topicName": topic_name,
      "has_2fa": has_2fa
    } | tojson | safe }}
  </script>

  <!-- Modules applicatifs (ordre de chargement important) -->
  <script src="/static/assets/js/sections/profile.js"></script>
  <script src="/static/assets/js/sections/dashboard_section.js"></script>
  <script src="/static/assets/js/sections/users.js"></script>
  <script src="/static/assets/js/sections/classes.js"></script>
  <script src="/static/assets/js/sections/schedule.js"></script>
  <script src="/static/assets/js/sections/grades.js"></script>
  <script src="/static/assets/js/sections/attendance.js"></script>
  <script src="/static/assets/js/sections/messages.js"></script>
  <!-- main.js en dernier : il orchestre tout et lance init() -->
  <script src="/static/assets/js/main.js"></script>

</body>

</html>
