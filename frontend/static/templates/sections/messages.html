<!-- Template : Messagerie -->
<div class="row" id="messagesContainer">

  <!-- Panneau gauche : liste des tickets -->
  <div class="col-lg-3">
      <div class="card shadow-1 h-100">
      <div class="card-header border-bottom bg-white">
        <div class="d-flex justify-content-between align-items-center">
          <div class="d-flex align-items-center gap-2">
            <h6 class="mb-0 text-lg fw-semibold">Tickets</h6>
            <span id="messagingNotificationBadge" 
              style="display:none; min-width:24px; height:24px; background-color:#dc3545; color:white; border-radius:50%; font-size:0.75rem; font-weight:bold; display:none; align-items:center; justify-content:center; flex-shrink:0;">
              0
            </span>
          </div>
          <button class="btn btn-sm btn-primary" onclick="showNewTicketForm()" title="Créer un ticket">
            <i class="ri-add-line"></i>
          </button>
        </div>
      </div>
      <div class="card-body p-0" style="max-height: 520px; overflow-y: auto;">
        <div id="ticketListPanel" class="list-group list-group-flush">
          <div class="text-center py-4">
            <span class="spinner-border text-primary"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Panneau central : conversation -->
  <div class="col-lg-9 mt-4 mt-lg-0" id="conversationPanel">
      <div class="card shadow-1 h-100">
      <div class="card-header border-bottom bg-white">
        <div class="d-flex justify-content-between align-items-start">
          <div id="ticketThreadHeader">
            <div class="fw-semibold">Sélectionnez un ticket</div>
            <div class="text-sm text-neutral-500"></div>
          </div>
          <button class="btn btn-sm btn-danger" id="closeTicketBtn" style="display:none;" onclick="closeCurrentTicket()" title="Fermer ce ticket">
            <i class="ri-close-line"></i> Fermer
          </button>
        </div>
      </div>
      <div class="card-body d-flex flex-column p-0" style="min-height: 0; height: 100%; overflow: hidden;">
        <div id="ticketMessagesPanel" class="flex-grow-1" style="overflow-y: auto; padding: 1.5rem; overflow-x: hidden; scrollbar-width: thin; scrollbar-color: #a4b0f5 rgba(45,65,105,0.2);">
          <div class="text-center text-muted py-5">Aucune conversation sélectionnée.</div>
        </div>
        <div class="border-top p-16" id="ticketComposer">
          <textarea id="ticketReplyInput" class="form-control radius-8 bg-neutral-50 border-0 mb-2"
            rows="2" placeholder="Écrire une réponse..." style="resize: none; min-height: 64px; max-height: 92px;" disabled></textarea>
          <button class="btn btn-primary" onclick="sendConversationReply()" disabled>Envoyer</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Modal : Formulaire de création de ticket (plein écran) -->
<div id="newTicketModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background-color:rgba(0,0,0,0.5); z-index:1050; overflow-y:auto;">
  <div class="container mt-5" style="max-width:600px; margin-bottom:50px;">
    <div class="card shadow-1">
      <div class="card-header border-bottom bg-white d-flex justify-content-between align-items-center">
        <h6 class="mb-0 text-lg fw-semibold">Nouveau ticket</h6>
        <button type="button" class="btn-close" onclick="closeNewTicketForm()"></button>
      </div>
      <div class="card-body">
        <div id="ticketFormAlert" style="display:none;"></div>

        <div class="mb-3">
          <label class="form-label text-sm fw-medium">Sujet</label>
          <input type="text" id="ticketSubject" class="form-control radius-8 bg-neutral-50 border-0"
            placeholder="Objet du ticket">
        </div>

        <div class="mb-3">
          <label class="form-label text-sm fw-medium">Destinataire</label>
          <input type="text" id="ticketRecipientSearch"
            class="form-control radius-8 bg-neutral-50 border-0"
            placeholder="Rechercher..."
            oninput="handleRecipientInput(event)">
          <input type="hidden" id="ticketRecipientId">
          <small id="recipientSelectedPreview" class="text-success d-block mt-1" style="display:none;"></small>
          <div id="recipientSuggestions" class="list-group mt-2" style="max-height: 200px; overflow-y: auto;"></div>
        </div>

        <div class="mb-3">
          <label class="form-label text-sm fw-medium">Message</label>
          <textarea id="ticketMessageInput" class="form-control radius-8 bg-neutral-50 border-0"
            rows="4" placeholder="Expliquez votre demande..."></textarea>
        </div>

        <button class="btn btn-primary w-100" onclick="submitNewTicket()">Créer le ticket</button>
      </div>
    </div>
  </div>
</div>
