<!-- Template : Tableau de Bord -->
<!-- Les stats, le graphique et l'activité récente sont injectés par JS -->

<div class="row gy-4 mb-4">
  <div class="col-xxl-12">
    <!-- Cartes de statistiques (4 cartes) -->
    <div class="row gy-4" id="dashboardStatsCards">
      <div class="col-xxl-3 col-sm-6">
        <div class="card shadow-1 radius-8 h-100">
          <div class="card-body p-20">
            <div class="d-flex flex-wrap align-items-center gap-3 mb-16">
              <div class="w-44-px h-44-px bg-warning-600 rounded-circle d-flex justify-content-center align-items-center text-white">
                <i class="ri-graduation-cap-line text-xl"></i>
              </div>
              <p class="fw-medium text-primary-light mb-1">Total Étudiants</p>
            </div>
            <h6 class="mb-0">210</h6>
          </div>
        </div>
      </div>
    
      <div class="col-xxl-3 col-sm-6">
        <div class="card shadow-1 radius-8 h-100">
          <div class="card-body p-20">
            <div class="d-flex flex-wrap align-items-center gap-3 mb-16">
              <div class="w-44-px h-44-px bg-blue-600 rounded-circle d-flex justify-content-center align-items-center text-white">
                <i class="ri-user-follow-line text-xl"></i>
              </div>
              <p class="fw-medium text-primary-light mb-1">Total Professeurs</p>
            </div>
            <h6 class="mb-0">26</h6>
          </div>
        </div>
      </div>
    
      <div class="col-xxl-3 col-sm-6">
        <div class="card shadow-1 radius-8 h-100">
          <div class="card-body p-20">
            <div class="d-flex flex-wrap align-items-center gap-3 mb-16">
              <div class="w-44-px h-44-px bg-purple-600 rounded-circle d-flex justify-content-center align-items-center text-white">
                <i class="ri-book-2-line text-xl"></i>
              </div>
              <p class="fw-medium text-primary-light mb-1">Total Classes</p>
            </div>
            <h6 class="mb-0">7</h6>
          </div>
        </div>
      </div>
    
      <div class="col-xxl-3 col-sm-6">
        <div class="card shadow-1 radius-8 h-100">
          <div class="card-body p-20">
            <div class="d-flex flex-wrap align-items-center gap-3 mb-16">
              <div class="w-44-px h-44-px bg-success-600 rounded-circle d-flex justify-content-center align-items-center text-white">
                <i class="ri-check-double-line text-xl"></i>
              </div>
              <p class="fw-medium text-primary-light mb-1">Plateforme</p>
            </div>
            <h6 class="mb-0">Active</h6>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Graphique principal -->
<div class="row mt-5 align-items-stretch">
  <div class="col-12 col-lg-8" id="mainChartWrapper">
    <div class="card shadow-1 radius-12 h-100">
      <div class="card-body p-24 d-flex flex-column">
        <h6 class="text-lg fw-semibold mb-20" id="dashboardChartTitle">
          <i class="ri-bar-chart-fill text-primary me-2"></i>
          <span id="dashboardChartTitleText"></span>
        </h6>
        <div id="mainChart" class="flex-grow-1" style="min-height: 315px;"></div>
      </div>
    </div>
  </div>

  <!-- Graphique Doughnut - Retards des étudiants -->
  <div class="col-12 col-lg-4" id="attendanceCardWrapper">
    <div class="card shadow-1 radius-12 h-100">
      <div class="card-body p-24 d-flex flex-column">
        <h6 class="text-lg fw-semibold mb-20" id="attendanceChartTitle">
          <i class="ri-time-line text-warning me-2"></i><span id="attendanceChartTitleText">Retards des Étudiants</span>
        </h6>
        <div id="attendanceChart" class="flex-grow-1" style="min-height: 315px;"></div>
      </div>
    </div>
  </div>
</div>

<!-- Activités récentes -->
<div class="row mt-5">
  <div class="col-12">
    <div class="card shadow-1 radius-12">
      <div class="card-header border-bottom bg-white p-24">
        <h6 class="text-lg fw-semibold mb-0">
          <i class="ri-history-line text-warning me-2"></i>Activités Récentes
        </h6>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover table-borderless mb-0">
            <thead class="bg-neutral-50 border-bottom text-neutral-500 text-xs text-uppercase fw-semibold">
              <tr>
                <th class="ps-24 py-16">Action</th>
                <th class="py-16">Détail</th>
                <th class="py-16">Date</th>
              </tr>
            </thead>
            <tbody id="recentActivitiesBody">
              <tr>
                <td colspan="3" class="text-center text-muted py-4">Chargement des activités...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
